info:
  name: 02_login
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "join+{{random}}@example.com",
        "password": "joinpassword"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        bru.setEnvVar("join_access_token", body.access_token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
