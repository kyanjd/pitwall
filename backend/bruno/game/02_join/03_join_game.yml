info:
  name: 03_join_game
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/game/join"
  headers:
    - name: Authorization
      value: Bearer {{join_access_token}}
  body:
    type: json
    data: |-
      {
        "invite_code": "{{invite_code}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
