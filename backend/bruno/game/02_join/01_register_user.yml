info:
  name: 01_register_user
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/user/"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Test Joiner",
        "email": "join+{{random}}@example.com",
        "password": "joinpassword"
      }
  auth: inherit

runtime:
  scripts:
    - type: before-request
      code: bru.setEnvVar("random", Date.now());

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
