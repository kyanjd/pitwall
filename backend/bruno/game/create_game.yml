info:
  name: create_game
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/game/"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  params:
    - name: ""
      value: ""
      type: query
  body:
    type: json
    data: |-
      {
        "name": "Test Game"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        bru.setEnvVar("invite_code", body.invite_code);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
