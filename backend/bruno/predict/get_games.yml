info:
  name: get_games
  type: http
  seq: 4

http:
  method: GET
  url: "{{base_url}}/game/"
  headers:
    - name: Authorization
      value: Bearer {{access_token}}
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        bru.setEnvVar("game_id", body[0].id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
