info:
  name: get_seasons
  type: http
  seq: 1

http:
  method: GET
  url: "{{base_url}}/f1/seasons"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        bru.setEnvVar("season", body.seasons[0]);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
