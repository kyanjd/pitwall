info:
  name: get_drivers
  type: http
  seq: 3

http:
  method: GET
  url: "{{base_url}}/f1/session/{{session_id}}/drivers"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        bru.setEnvVar("position_driver", body[0].id);
        bru.setEnvVar("dnf_driver", body[1].id)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
